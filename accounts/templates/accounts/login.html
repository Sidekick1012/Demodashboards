<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinPro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f6f3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:400px;padding:20px}
.card{background:#fff;border-radius:14px;padding:36px;border:1px solid rgba(0,0,0,0.08)}
.logo{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-0.5px}
.logo span{color:#2563eb}
.sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:6px}
input{width:100%;padding:10px 13px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:11px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;transition:background .15s}
.btn:hover{background:#333}
.link{text-align:center;margin-top:16px;font-size:13px;color:#6b7280}
.link a{color:#2563eb;font-weight:500}
.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:#9ca3af;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.features{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.feat{background:#f9fafb;border-radius:8px;padding:10px 12px;font-size:12px;color:#374151}
.feat-icon{font-size:16px;margin-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">Fin<span>Pro</span></div>
    <div class="sub">Sign in to your accounting dashboard</div>
    {% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}
    <form method="POST">{% csrf_token %}
      <div class="form-group"><label>Username</label><input name="username" placeholder="your username" required autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn">Sign in →</button>
    </form>
    <div class="link">Don't have an account? <a href="{% url 'register' %}">Create one free</a></div>
    <div class="divider">includes</div>
    <div class="features">
      <div class="feat"><div class="feat-icon">📊</div>Live dashboard</div>
      <div class="feat"><div class="feat-icon">📄</div>AR / AP tracking</div>
      <div class="feat"><div class="feat-icon">💰</div>Expense manager</div>
      <div class="feat"><div class="feat-icon">📈</div>Revenue reports</div>
    </div>
  </div>
</div>
</body>
</html>
