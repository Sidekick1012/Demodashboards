{% extends 'base.html' %}
{% block title %}New Bill{% endblock %}
{% block page_title %}New Bill{% endblock %}
{% block content %}
<div style="max-width:600px">
<div class="page-header"><h1 style="font-size:20px;font-weight:600">New Bill</h1><a href="{% url 'bills' %}" class="btn btn-outline">← Back</a></div>
<div class="card">
<form method="POST">{% csrf_token %}
  <div class="form-row"><div class="form-group"><label class="form-label">Supplier</label><select name="supplier" class="form-select" required>{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
  <div class="form-group"><label class="form-label">Bill number</label><input name="bill_number" class="form-input" value="{{ next_num }}" required></div></div>
  <div class="form-row"><div class="form-group"><label class="form-label">Issue date</label><input type="date" name="issue_date" class="form-input" value="{{ today }}" required></div>
  <div class="form-group"><label class="form-label">Due date</label><input type="date" name="due_date" class="form-input" value="{{ due }}" required></div></div>
  <div class="form-group"><label class="form-label">Amount (PKR)</label><input type="number" name="amount" class="form-input" placeholder="50000" step="0.01" required></div>
  <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-input" rows="2"></textarea></div>
  <button type="submit" class="btn btn-primary">Add bill →</button>
</form>
</div>
{% if not suppliers %}<div style="margin-top:12px;font-size:13px;color:var(--muted)">No suppliers yet — <a href="{% url 'suppliers' %}" style="color:var(--blue)">add a supplier first</a></div>{% endif %}
</div>
{% endblock %}
