<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinPro — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f6f3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:20px}
.card{background:#fff;border-radius:14px;padding:36px;border:1px solid rgba(0,0,0,0.08)}
.logo{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-0.5px}
.logo span{color:#2563eb}
.sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:6px}
input{width:100%;padding:10px 13px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:11px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.link{text-align:center;margin-top:16px;font-size:13px;color:#6b7280}
.link a{color:#2563eb;font-weight:500}
.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">Fin<span>Pro</span></div>
    <div class="sub">Create your free accounting account</div>
    {% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}
    <form method="POST">{% csrf_token %}
      <div class="form-group"><label>Company name</label><input name="company_name" placeholder="Pak Trading Co." required autofocus></div>
      <div class="form-group"><label>Email (optional)</label><input type="email" name="email" placeholder="you@company.com"></div>
      <div class="form-group"><label>Username</label><input name="username" placeholder="choose a username" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="min 8 characters" required></div>
      <button type="submit" class="btn">Create account →</button>
    </form>
    <div class="link">Already have an account? <a href="{% url 'login' %}">Sign in</a></div>
  </div>
</div>
</body>
</html>
