{% extends 'base.html' %}
{% block title %}New Invoice{% endblock %}
{% block page_title %}New Invoice{% endblock %}
{% block content %}
<div style="max-width:600px">
<div class="page-header"><h1 style="font-size:20px;font-weight:600">New Invoice</h1><a href="{% url 'invoices' %}" class="btn btn-outline">← Back</a></div>
<div class="card">
<form method="POST">{% csrf_token %}
  <div class="form-row"><div class="form-group"><label class="form-label">Customer</label><select name="customer" class="form-select" required>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
  <div class="form-group"><label class="form-label">Invoice number</label><input name="invoice_number" class="form-input" value="{{ next_num }}" required></div></div>
  <div class="form-row"><div class="form-group"><label class="form-label">Issue date</label><input type="date" name="issue_date" class="form-input" value="{{ today }}" required></div>
  <div class="form-group"><label class="form-label">Due date</label><input type="date" name="due_date" class="form-input" value="{{ due }}" required></div></div>
  <div class="form-group"><label class="form-label">Amount (PKR)</label><input type="number" name="amount" class="form-input" placeholder="50000" step="0.01" required></div>
  <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-input" rows="2" placeholder="Services rendered..."></textarea></div>
  <button type="submit" class="btn btn-primary">Create invoice →</button>
</form>
</div>
{% if not customers %}<div style="margin-top:12px;font-size:13px;color:var(--muted)">No customers yet — <a href="{% url 'customers' %}" style="color:var(--blue)">add a customer first</a></div>{% endif %}
</div>
{% endblock %}
